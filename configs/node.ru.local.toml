[node]
node_id         = "ru-node-01"
node_scope      = "regional"
region          = "RU"
operator_id     = "example-operator"
policy_version  = "0.1.0"
applicable_law  = "RU-PDL"
signed_by       = "ed25519:REPLACE_ME"

[profile]
name            = "balanced"

[policy.outbound]
allow_to        = ["RS", "BY", "KZ", "AM"]
deny_to         = []
store_locally   = true

[policy.inbound]
min_trust_tier  = 0

[policy.audit]
log_all_decisions   = true
log_backend         = "local-merkle"
export_to_operator  = false
dns_txt_publish     = true
dns_txt_interval_s  = 21600
https_well_known    = true

[network]
listen_addr         = "0.0.0.0:7778"
grpc_port           = 7778
http_port           = 8081
metrics_port        = 9091

[peers.RS]
addr       = "localhost:7777"
node_scope = "regional"
