[node]
node_id         = "rs-node-01"
node_scope      = "regional"
region          = "RS"
operator_id     = "example-operator"
policy_version  = "0.1.0"
applicable_law  = "RS-GDPR"
signed_by       = "ed25519:REPLACE_ME"

[profile]
name            = "balanced"

[policy.outbound]
allow_to        = ["RU", "BY", "KZ", "AM"]
deny_to         = []
store_locally   = true

[policy.inbound]
min_trust_tier  = 0

[policy.audit]
log_all_decisions   = true
log_backend         = "local-merkle"
export_to_operator  = false
dns_txt_publish     = true
dns_txt_interval_s  = 21600
https_well_known    = true

[network]
listen_addr         = "0.0.0.0:7777"
grpc_port           = 7777
http_port           = 8080
metrics_port        = 9090

[tls]
insecure = true

[peers.RU]
addr       = "localhost:7778"
node_scope = "regional"

[apps.mrmi-demo]
auto_accept = "auto_all"

[apps.mrmi-demo.users.marko-01]
display_hint = "Marko Petrović"
region       = "RS"

[apps.mrmi-demo.users.ana-01]
display_hint = "Ana Nikolić"
region       = "RS"

[apps.mrmi-demo.users.stefan-01]
display_hint = "Stefan Jovanović"
region       = "RS"
